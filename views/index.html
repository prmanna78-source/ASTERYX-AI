<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<title>ASTERYX AI — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

[data-theme="dark"]{
--blue:#2A7FFF;--indigo:#5B5FFF;
--bg:#030712;
--sidebar-bg:rgba(5,8,18,0.98);
--topbar-bg:rgba(5,8,18,0.85);
--border:rgba(255,255,255,0.07);
--text:#E8EDF8;--text2:#c0cce0;--muted:#6B7A9A;
--input-bg:rgba(255,255,255,0.04);
--input-box-bg:rgba(255,255,255,0.04);
--chat-item-hover:rgba(255,255,255,0.05);
--chat-item-active:rgba(42,127,255,0.1);
--chat-item-active-border:rgba(42,127,255,0.18);
--bot-bubble-bg:rgba(255,255,255,0.04);
--bot-bubble-border:rgba(255,255,255,0.08);
--user-pill-bg:rgba(255,255,255,0.04);
--toggle-bg:rgba(255,255,255,0.06);--toggle-border:rgba(255,255,255,0.1);
--model-tag-bg:transparent;
}
[data-theme="light"]{
--blue:#1d6ff0;--indigo:#4f4fff;
--bg:#eef2fc;
--sidebar-bg:rgba(240,244,255,0.98);
--topbar-bg:rgba(240,244,255,0.9);
--border:rgba(30,80,200,0.1);
--text:#0f172a;--text2:#1e293b;--muted:#5a6a8a;
--input-bg:rgba(255,255,255,0.8);
--input-box-bg:rgba(255,255,255,0.7);
--chat-item-hover:rgba(42,127,255,0.05);
--chat-item-active:rgba(42,127,255,0.1);
--chat-item-active-border:rgba(42,127,255,0.2);
--bot-bubble-bg:rgba(255,255,255,0.9);
--bot-bubble-border:rgba(30,80,200,0.12);
--user-pill-bg:rgba(42,127,255,0.05);
--toggle-bg:rgba(30,80,200,0.07);--toggle-border:rgba(30,80,200,0.18);
--model-tag-bg:rgba(255,255,255,0.5);
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;transition:background 0.3s,color 0.3s}
.cursor-glow{position:fixed;width:400px;height:400px;background:radial-gradient(circle,rgba(42,127,255,0.06),transparent 65%);pointer-events:none;z-index:0;transform:translate(-50%,-50%)}

/* ===== SIDEBAR ===== */
.sidebar{width:260px;height:100vh;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:2;transition:background 0.3s,border-color 0.3s}
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid var(--border);transition:border-color 0.3s}
.logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text)}
.logo img{width:32px;height:32px;border-radius:50%;box-shadow:0 0 12px rgba(42,127,255,0.4);border:1px solid rgba(42,127,255,0.3)}
.btn-new-chat{width:100%;padding:10px 14px;border-radius:10px;border:1px dashed rgba(42,127,255,0.3);background:rgba(42,127,255,0.06);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.btn-new-chat:hover{border-color:rgba(42,127,255,0.6);background:rgba(42,127,255,0.1);color:var(--text)}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:16px 16px 8px;transition:color 0.3s}
.chatlist{flex:1;overflow-y:auto;padding:4px 8px}
.chatlist::-webkit-scrollbar{width:4px}.chatlist::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.chat-item{padding:10px 12px;border-radius:10px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:10px;margin-bottom:2px;border:1px solid transparent}
.chat-item:hover{background:var(--chat-item-hover)}
.chat-item.active{background:var(--chat-item-active);border-color:var(--chat-item-active-border)}
.chat-item-icon{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
[data-theme="light"] .chat-item-icon{background:rgba(42,127,255,0.08)}
.chat-item-text{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.2s}
.chat-item.active .chat-item-text{color:var(--text)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);transition:border-color 0.3s}
.user-pill{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:var(--user-pill-bg);cursor:pointer;transition:all 0.2s}
.user-pill:hover{background:rgba(42,127,255,0.08)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;color:white}
.user-name{font-size:13px;font-weight:500;transition:color 0.3s}
.user-status{font-size:11px;color:var(--muted);transition:color 0.3s}
.logout-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:4px;border-radius:6px;transition:all 0.2s}
.logout-btn:hover{color:var(--text)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;position:relative;z-index:1;overflow:hidden}
.topbar{height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--topbar-bg);backdrop-filter:blur(10px);flex-shrink:0;transition:background 0.3s,border-color 0.3s}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:28px;height:28px;border-radius:50%;box-shadow:0 0 10px rgba(42,127,255,0.3)}
.topbar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);transition:color 0.3s}
.topbar-badge{font-size:10px;padding:2px 8px;border-radius:100px;background:rgba(42,127,255,0.1);border:1px solid rgba(42,127,255,0.2);color:var(--blue);font-weight:500;letter-spacing:0.5px}
.topbar-right{display:flex;align-items:center;gap:10px}
.model-tag{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--model-tag-bg);transition:all 0.3s}
.model-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* THEME TOGGLE in chat */
.theme-toggle{width:34px;height:34px;border-radius:8px;cursor:pointer;border:1px solid var(--toggle-border);background:var(--toggle-bg);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.25s}
.theme-toggle:hover{transform:scale(1.1);box-shadow:0 0 10px rgba(42,127,255,0.2)}
[data-theme="dark"] .sun{display:none}[data-theme="dark"] .moon{display:block}
[data-theme="light"] .moon{display:none}[data-theme="light"] .sun{display:block}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:32px 40px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:6px}.messages::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.2);border-radius:3px}
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0.5}
.empty-logo{width:60px;height:60px;border-radius:50%;opacity:0.4}
.empty-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--text);transition:color 0.3s}
.empty-sub{font-size:14px;color:var(--muted);transition:color 0.3s}
.empty-suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.suggestion{padding:8px 16px;border-radius:100px;border:1px solid var(--border);background:rgba(42,127,255,0.04);font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.2s}
.suggestion:hover{border-color:rgba(42,127,255,0.4);background:rgba(42,127,255,0.08);color:var(--blue);opacity:1!important}

.msg-row{display:flex;gap:12px;margin-bottom:24px;animation:msgIn 0.3s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-top:2px}
.msg-avatar.bot-av{background:rgba(42,127,255,0.15);border:1px solid rgba(42,127,255,0.2);overflow:hidden}
.msg-avatar.bot-av img{width:100%;height:100%;border-radius:50%}
.msg-avatar.user-av{background:linear-gradient(135deg,var(--blue),var(--indigo));color:white}
.msg-content{max-width:65%}
.msg-name{font-size:11px;font-weight:500;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;transition:color 0.3s}
.msg-row.user .msg-name{text-align:right}
.msg-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;word-wrap:break-word}
.msg-bubble.user-bubble{background:linear-gradient(135deg,var(--blue),var(--indigo));color:white;border-bottom-right-radius:4px}
.msg-bubble.bot-bubble{background:var(--bot-bubble-bg);border:1px solid var(--bot-bubble-border);border-bottom-left-radius:4px;color:var(--text);transition:background 0.3s,border-color 0.3s,color 0.3s}

.typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);margin:0 2px;animation:bounce 1s infinite}
.typing-dot:nth-child(2){animation-delay:0.15s}.typing-dot:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.cursor{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:2px;vertical-align:middle;animation:blink 0.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* INPUT */
.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--topbar-bg);backdrop-filter:blur(10px);flex-shrink:0;transition:background 0.3s,border-color 0.3s}
.input-box{display:flex;align-items:flex-end;gap:10px;background:var(--input-box-bg);border:1px solid var(--border);border-radius:14px;padding:10px 12px;transition:all 0.2s}
.input-box:focus-within{border-color:rgba(42,127,255,0.4);box-shadow:0 0 0 3px rgba(42,127,255,0.06)}
.input-box textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;line-height:1.5;max-height:120px;min-height:24px;padding:4px 0;transition:color 0.3s}
.input-box textarea::placeholder{color:var(--muted)}
.btn-send{width:36px;height:36px;border-radius:10px;border:none;background:var(--blue);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.btn-send:hover{background:#1a6ef0;transform:scale(1.05);box-shadow:0 0 15px rgba(42,127,255,0.4)}
.btn-send svg{width:16px;height:16px}
.input-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;letter-spacing:0.3px;transition:color 0.3s}
</style>
</head>
<body>
<div class="cursor-glow" id="cursor-glow"></div>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo"><img src="logo.png" alt="ASTERYX">ASTERYX</div>
    <button class="btn-new-chat" onclick="newChat()"><span>＋</span> New conversation</button>
  </div>
  <div class="sidebar-label">Conversations</div>
  <div class="chatlist" id="chatlist"></div>
  <div class="sidebar-footer">
    <div class="user-pill">
      <div class="user-avatar">U</div>
      <div style="flex:1;min-width:0"><div class="user-name">You</div><div class="user-status">Online</div></div>
      <button class="logout-btn" onclick="location.href='/logout'" title="Sign out">⎋</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <img src="logo.png" class="topbar-logo" alt="ASTERYX">
      <span class="topbar-title">ASTERYX AI</span>
      <span class="topbar-badge">BETA</span>
    </div>
    <div class="topbar-right">
      <div class="model-tag"><span class="model-dot"></span>Llama 3 · Offline</div>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
        <span class="moon">🌙</span><span class="sun">☀️</span>
      </button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <img src="logo.png" class="empty-logo" alt="">
      <div class="empty-title">How can I help you?</div>
      <div class="empty-sub">Ask me anything — coding, robotics, writing, or ideas.</div>
      <div class="empty-suggestions">
        <div class="suggestion" onclick="fillInput(this)">Write a Python script</div>
        <div class="suggestion" onclick="fillInput(this)">Explain neural networks</div>
        <div class="suggestion" onclick="fillInput(this)">Debug my code</div>
        <div class="suggestion" onclick="fillInput(this)">Help with robotics</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="input" placeholder="Ask ASTERYX anything…" rows="1"></textarea>
      <button class="btn-send" onclick="send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
// ===== THEME =====
const html = document.documentElement
const toggleBtn = document.getElementById('themeToggle')
function applyTheme(t) { html.setAttribute('data-theme', t); localStorage.setItem('asteryx-theme', t) }
applyTheme(localStorage.getItem('asteryx-theme') || 'dark')
toggleBtn.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'))

// ===== CURSOR =====
const glow = document.getElementById('cursor-glow')
addEventListener('mousemove', e => { glow.style.left=e.clientX+'px'; glow.style.top=e.clientY+'px' })

// ===== CHAT =====
const inputEl = document.getElementById('input')
const messagesEl = document.getElementById('messages')
const chatlistEl = document.getElementById('chatlist')
let chats = [], currentChat = 0

inputEl.addEventListener('input', () => { inputEl.style.height='auto'; inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px' })
inputEl.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} })

function fillInput(el) { inputEl.value=el.textContent; inputEl.focus() }

function newChat() {
  chats.push([]); currentChat=chats.length-1
  messagesEl.innerHTML=''; messagesEl.appendChild(buildEmpty())
  renderChats()
}

function buildEmpty() {
  const d=document.createElement('div'); d.className='empty-state'; d.id='empty-state'
  d.innerHTML=`<img src="logo.png" class="empty-logo" alt=""><div class="empty-title">How can I help you?</div><div class="empty-sub">Ask me anything — coding, robotics, writing, or ideas.</div><div class="empty-suggestions"><div class="suggestion" onclick="fillInput(this)">Write a Python script</div><div class="suggestion" onclick="fillInput(this)">Explain neural networks</div><div class="suggestion" onclick="fillInput(this)">Debug my code</div><div class="suggestion" onclick="fillInput(this)">Help with robotics</div></div>`
  return d
}

function renderChats() {
  chatlistEl.innerHTML=''
  chats.forEach((c,i) => {
    const d=document.createElement('div'); d.className='chat-item'+(i===currentChat?' active':'')
    const first=c.find(m=>m.type==='user')
    d.innerHTML=`<div class="chat-item-icon">💬</div><div class="chat-item-text">${first?first.text.substring(0,28)+'…':'New Chat'}</div>`
    d.onclick=()=>{currentChat=i;loadChat()}
    chatlistEl.appendChild(d)
  })
}

function loadChat() {
  messagesEl.innerHTML=''
  if(chats[currentChat].length===0) messagesEl.appendChild(buildEmpty())
  else chats[currentChat].forEach(m=>appendMessage(m.type,m.text,false))
  renderChats()
}

function appendMessage(type, text, animate=true) {
  const es=messagesEl.querySelector('.empty-state'); if(es)es.remove()
  const row=document.createElement('div'); row.className='msg-row '+type
  if(!animate) row.style.animation='none'
  if(type==='user'){
    row.innerHTML=`<div class="msg-avatar user-av">U</div><div class="msg-content"><div class="msg-name">You</div><div class="msg-bubble user-bubble">${escHtml(text)}</div></div>`
  } else {
    row.innerHTML=`<div class="msg-avatar bot-av"><img src="logo.png" alt="A"></div><div class="msg-content"><div class="msg-name">ASTERYX</div><div class="msg-bubble bot-bubble" id="bot-bubble-latest"></div></div>`
  }
  messagesEl.appendChild(row); messagesEl.scrollTop=messagesEl.scrollHeight
  return row
}

function typeText(el, text, cb) {
  let i=0; el.innerHTML=''
  const cursor=document.createElement('span'); cursor.className='cursor'
  const iv=setInterval(()=>{
    el.textContent=text.substring(0,i); el.appendChild(cursor); i++
    if(i>text.length){ clearInterval(iv); cursor.remove(); el.textContent=text; if(cb)cb() }
    messagesEl.scrollTop=messagesEl.scrollHeight
  }, 12)
}

function escHtml(t){ const d=document.createElement('div');d.textContent=t;return d.innerHTML }

async function send() {
  const text=inputEl.value.trim(); if(!text)return
  appendMessage('user',text); chats[currentChat].push({type:'user',text})
  inputEl.value=''; inputEl.style.height='auto'
  const botRow=appendMessage('bot','')
  const bubble=botRow.querySelector('#bot-bubble-latest')
  bubble.innerHTML='<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>'
  renderChats()
  try {
    const res=await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:text})})
    const data=await res.json()
    typeText(bubble,data.reply,()=>{ chats[currentChat].push({type:'bot',text:data.reply}) })
  } catch(e) {
    typeText(bubble,'AI engine not running or connection failed.')
    chats[currentChat].push({type:'bot',text:'AI engine not running or connection failed.'})
  }
}

newChat()
</script>
</body>
</html>
